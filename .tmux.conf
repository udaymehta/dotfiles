# ─── Terminal & core ──────────────────────────────────────────────────────────
set -g  default-terminal   "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -ga terminal-overrides ",xterm-kitty:Ms=\\E]52;%p1%s;%p2%s\\7"
set -sg escape-time        0       # no ESC delay — neovim needs this
set -g  repeat-time        0
set -g  history-limit      50000
set -g  focus-events       on      # so neovim autoread works on focus
set -g  mouse              on

# ─── Indexing ─────────────────────────────────────────────────────────────────
set  -g  base-index       1
setw -g  pane-base-index  1
set  -g  renumber-windows on

# ─── Window titles ────────────────────────────────────────────────────────────
setw -g  automatic-rename on
set  -g  set-titles        on
set  -g  set-titles-string "#S / #W"

# ─── Timing ───────────────────────────────────────────────────────────────────
set -g status-interval    5
set -g display-time       1500
set -g display-panes-time 1500

# ═══════════════════════════════════════════════════════════════════════════════
#  PREFIX
# ═══════════════════════════════════════════════════════════════════════════════
unbind C-b
set -g  prefix M-Space
bind   M-Space send-prefix

# ═══════════════════════════════════════════════════════════════════════════════
#  DIRECT BINDINGS — Alt+key, no prefix, no neovim conflicts
# ═══════════════════════════════════════════════════════════════════════════════

# Jump to window by number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Cycle windows
bind -n M-[ previous-window
bind -n M-] next-window

# New window in current directory
bind -n M-n new-window -c "#{pane_current_path}"

# Kill window (confirmed)
bind -n M-x confirm-before -p "kill window #W? (y/n)" kill-window

# Zoom active pane
bind -n M-z resize-pane -Z

# Sessionizer — opens in a new window exactly like Primeagen's setup.
# fzf runs there, you pick, it switches session, window closes itself.
bind -n M-p run-shell "tmux neww tmux-sessionizer"

# ═══════════════════════════════════════════════════════════════════════════════
#  PREFIX BINDINGS — M-Space then key
# ═══════════════════════════════════════════════════════════════════════════════

# Sessions
bind s choose-tree -Zs                                      # s = session tree
bind S new-session                                          # S = new Session
bind R command-prompt "rename-session '%%'"                 # R = Rename session
bind d detach-client                                        # d = detach

# Windows
bind t new-window -c "#{pane_current_path}"                 # t = new tab
bind r command-prompt "rename-window '%%'"                  # r = rename
bind x confirm-before -p "kill window? (y/n)" kill-window  # x = close
bind n next-window
bind p previous-window
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# Panes
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"            # | = side by side
bind - split-window -v -c "#{pane_current_path}"            # - = top / bottom

# Pane navigation — prefix + hjkl (C-hjkl stays in neovim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Break pane into its own window
bind b break-pane

# Utilities
bind e source-file ~/.tmux.conf \; display-message "config reloaded"
bind y set-window-option synchronize-panes \; display-message "sync toggled"
bind L clear-history

# Copy mode
setw -g mode-keys vi
bind  [   copy-mode
bind  P   paste-buffer
bind-key -T copy-mode-vi v   send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y   send -X copy-selection-and-cancel
bind-key -T copy-mode-vi H   send -X start-of-line
bind-key -T copy-mode-vi L   send -X end-of-line
bind-key -T copy-mode-vi Escape send -X cancel

# Activity
setw -g monitor-activity on
setw -g monitor-silence  0
setw -g monitor-bell     off
set  -g visual-activity  off

# ═══════════════════════════════════════════════════════════════════════════════
#  STATUS BAR 
#  Left:   session name
#  Center: window list
#  Right:  git branch (when in a repo) | HH:MM
# ═══════════════════════════════════════════════════════════════════════════════

set -g status-position  bottom
set -g status-justify   left
set -g status-style     "fg=colour244,bg=colour235"

# Left — session name, plain
set -g status-left-length 30
set -g status-left        "#[fg=colour255,bold] #S #[fg=colour240]| "

# Right — git branch + time
set -g status-right-length 60
set -g status-right \
  "#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/.*/& |/') #[fg=colour255]%H:%M "

# Window tabs — inactive
setw -g window-status-style         "fg=colour240,bg=colour235"
setw -g window-status-format        " #I:#W "

# Window tabs — active, just brighter, no background color blocks
setw -g window-status-current-style "fg=colour255,bold,bg=colour235"
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag, [z],} "

# Background window with activity — dim underline only
setw -g window-status-activity-style "fg=colour244,underscore,bg=colour235"

setw -g window-status-separator ""

# Pane borders — just lines, no color
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour244"

# Copy mode / selection
set -g mode-style "fg=colour235,bg=colour244"

# Messages
set -g message-style "fg=colour255,bg=colour235"
